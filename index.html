<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markov Motion</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <p class="eyebrow">Gesture Generative Music</p>
      <h1>Markov Motion</h1>
    </header>

    <main class="app-layout">
      <section class="panel transport-panel" aria-labelledby="transport-title">
        <div>
          <h2 id="transport-title">Audio</h2>
          <p id="audio-status" class="status">Audio engine idle</p>
        </div>
        <button id="start-audio" type="button">Start Audio</button>
      </section>

      <section class="panel video-panel" aria-labelledby="video-title">
        <h2 id="video-title">Webcam</h2>
        <div class="video-frame">
          <!-- Camera module will attach a MediaStream here later. -->
          <video id="webcam-video" autoplay muted playsinline></video>
          <canvas id="visuals-canvas" aria-hidden="true"></canvas>
          <p class="video-placeholder">Webcam preview placeholder</p>
        </div>
      </section>

      <section class="panel debug-panel" aria-labelledby="debug-title">
        <h2 id="debug-title">Debug</h2>
        <pre id="debug-output">Waiting for app state...</pre>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
